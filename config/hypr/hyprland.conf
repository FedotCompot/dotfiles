# #######################################################################################
# AUTOGENERATED HYPRLAND CONFIG.
# EDIT THIS CONFIG ACCORDING TO THE WIKI INSTRUCTIONS.
# #######################################################################################
# Forza le app Electron e Chromium a usare Wayland nativo
env = ELECTRON_OZONE_PLATFORM_HINT,wayland
env = NIXOS_OZONE_WL,1
env = GTK_IM_MODULE,ibus
# Forza le app GTK a usare la variante scura
env = GTK_THEME,adw-gtk3-dark

# Forza il tema scuro sulle app Qt (quelle in stile KDE)
env = QT_QPA_PLATFORMTHEME,qt6ct
env = QT_STYLE_OVERRIDE,kvantum
source = ~/.config/hypr/monitors.conf

# This is an example Hyprland config file.
# Refer to the wiki for more information.
# https://wiki.hypr.land/Configuring/

# Please note not all available settings / options are set here.
# For a full list, see the wiki

# You can split this configuration into multiple files
# Create your files separately and then link them to this file like this:
# source = ~/.config/hypr/myColors.conf


################
### MONITORS ###
################

# See https://wiki.hypr.land/Configuring/Monitors/
monitor=,preferred,auto,auto


###################
### MY PROGRAMS ###
###################

# See https://wiki.hypr.land/Configuring/Keywords/

# Set programs that you use
$terminal    = alacritty
$fileManager = dolphin
$menu        = hyprlauncher
$browser     = helium-browser
# Helium profiles: each gets its own --user-data-dir so they run as
# separate processes (Chromium reuses the running instance otherwise,
# which makes --class on later invocations a no-op).
$browser_personal = helium-browser --class=helium-personal --user-data-dir=$HOME/.config/net.imput.helium-personal
$browser_work     = helium-browser --class=helium-work     --user-data-dir=$HOME/.config/net.imput.helium-work
$editor      = code
$devopsApp   = freelens
$media       = spotify
$chat        = discord
$teamsApp    = ferdium
$utilApp     = obsidian
$sysApp      = pavucontrol

####################
### WORKSPACES   ###
####################

# Monitor names — keep workspace assignments below readable and portable
$monitor_left   = DP-4
$monitor_center = HDMI-A-1
$monitor_right  = DP-3

# Numbers row layout (left → right): ` 1 2 3 4 5 6 7 8 9 0 - =
# Workspace IDs match physical keyboard position so waybar order is consistent
$ws_terminal = 1     # ` — terminal
$ws_browser  = 2     # 1 — browser
$ws_code     = 3     # 2 — code editor
$ws_devops   = 4     # 3 — devops
$ws_files    = 5     # 4 — file manager
$ws_media    = 6     # 5 — multimedia
$ws_chat     = 7     # 6 — discord / telegram
$ws_teams    = 8     # 7 — teams (ferdium)
$ws_utility  = 9     # 8 — utility
$ws_settings = 10    # 9 — system settings
$ws_flex1    = 11    # 0 — flexible
$ws_flex2    = 12    # - — flexible
$ws_flex3    = 13    # = — flexible

# Open default app when a workspace is visited for the first time
workspace = $ws_terminal, monitor:$monitor_center, on-created-empty:alacritty
workspace = $ws_browser,  monitor:$monitor_left, on-created-empty:$browser_work
workspace = $ws_flex1,    monitor:$monitor_left, on-created-empty:$browser_personal
workspace = $ws_code,     monitor:$monitor_center, default:true, on-created-empty:~/.config/hypr/scripts/code-workspace.sh
workspace = $ws_devops,   monitor:$monitor_center, on-created-empty:freelens
workspace = $ws_files,    monitor:$monitor_center, on-created-empty:dolphin
workspace = $ws_media,    monitor:$monitor_right, on-created-empty:spotify
workspace = $ws_chat,     monitor:$monitor_right, on-created-empty:vesktop
workspace = $ws_teams,    monitor:$monitor_right, on-created-empty:ferdium
workspace = $ws_utility,  monitor:$monitor_right, on-created-empty:obsidian
workspace = $ws_settings, monitor:$monitor_right, on-created-empty:pavucontrol


#################
### AUTOSTART ###
#################

# Autostart necessary processes (like notifications daemons, status bars, etc.)
# Or execute your favorite apps at launch like this:

# exec-once = $terminal
# exec-once = nm-applet &
# exec-once = waybar & hyprpaper & firefox
exec-once = waybar
exec-once = swaync
exec-once = hyprpaper
exec-once = udiskie &

#############################
### ENVIRONMENT VARIABLES ###
#############################

# See https://wiki.hypr.land/Configuring/Environment-variables/

env = XCURSOR_SIZE,24
env = HYPRCURSOR_SIZE,24


###################
### PERMISSIONS ###
###################

# See https://wiki.hypr.land/Configuring/Permissions/
# Please note permission changes here require a Hyprland restart and are not applied on-the-fly
# for security reasons

# ecosystem {
#   enforce_permissions = 1
# }

# permission = /usr/(bin|local/bin)/grim, screencopy, allow
# permission = /usr/(lib|libexec|lib64)/xdg-desktop-portal-hyprland, screencopy, allow
# permission = /usr/(bin|local/bin)/hyprpm, plugin, allow


#####################
### LOOK AND FEEL ###
#####################

# Refer to https://wiki.hypr.land/Configuring/Variables/

# https://wiki.hypr.land/Configuring/Variables/#general
general {
    gaps_in = 3
    gaps_out = 5

    border_size = 2

    # https://wiki.hypr.land/Configuring/Variables/#variable-types for info about colors
    col.active_border = rgba(33ccffee) rgba(00ff99ee) 45deg
    col.inactive_border = rgba(595959aa)

    # Set to true enable resizing windows by clicking and dragging on borders and gaps
    resize_on_border = false

    # Please see https://wiki.hypr.land/Configuring/Tearing/ before you turn this on
    allow_tearing = false

    layout = master
}

# https://wiki.hypr.land/Configuring/Variables/#decoration
decoration {
    rounding = 10
    rounding_power = 2

    # Change transparency of focused and unfocused windows
    active_opacity = 1.0
    inactive_opacity = 1.0

    shadow {
        enabled = true
        range = 4
        render_power = 3
        color = rgba(1a1a1aee)
    }

    # https://wiki.hypr.land/Configuring/Variables/#blur
    blur {
        enabled = true
        size = 3
        passes = 1

        vibrancy = 0.1696
    }
}

# https://wiki.hypr.land/Configuring/Variables/#animations
animations {
    enabled = yes, please :)

    # Default curves, see https://wiki.hypr.land/Configuring/Animations/#curves
    #        NAME,           X0,   Y0,   X1,   Y1
    bezier = easeOutQuint,   0.23, 1,    0.32, 1
    bezier = easeInOutCubic, 0.65, 0.05, 0.36, 1
    bezier = linear,         0,    0,    1,    1
    bezier = almostLinear,   0.5,  0.5,  0.75, 1
    bezier = quick,          0.15, 0,    0.1,  1

    # Default animations, see https://wiki.hypr.land/Configuring/Animations/
    #           NAME,          ONOFF, SPEED, CURVE,        [STYLE]
    animation = global,        1,     10,    default
    animation = border,        1,     5.39,  easeOutQuint
    animation = windows,       1,     4.79,  easeOutQuint
    animation = windowsIn,     1,     4.1,   easeOutQuint, popin 87%
    animation = windowsOut,    1,     1.49,  linear,       popin 87%
    animation = fadeIn,        1,     1.73,  almostLinear
    animation = fadeOut,       1,     1.46,  almostLinear
    animation = fade,          1,     3.03,  quick
    animation = layers,        1,     3.81,  easeOutQuint
    animation = layersIn,      1,     4,     easeOutQuint, fade
    animation = layersOut,     1,     1.5,   linear,       fade
    animation = fadeLayersIn,  1,     1.79,  almostLinear
    animation = fadeLayersOut, 1,     1.39,  almostLinear
    animation = workspaces,    1,     1.94,  almostLinear, fade
    animation = workspacesIn,  1,     1.21,  almostLinear, fade
    animation = workspacesOut, 1,     1.94,  almostLinear, fade
    animation = zoomFactor,    1,     7,     quick
}

# Ref https://wiki.hypr.land/Configuring/Workspace-Rules/
# "Smart gaps" / "No gaps when only"
# uncomment all if you wish to use that.
workspace = w[tv1], gapsout:0, gapsin:0
workspace = f[1], gapsout:0, gapsin:0
windowrule {
    name = no-gaps-wtv1
    match:float = false
    match:workspace = w[tv1]

    border_size = 0
    rounding = 0
}

windowrule {
    name = no-gaps-f1
    match:float = false
    match:workspace = f[1]

    border_size = 0
    rounding = 0
}

# See https://wiki.hypr.land/Configuring/Dwindle-Layout/ for more
dwindle {
    # pseudotile = true # Master switch for pseudotiling. Enabling is bound to mainMod + P in the keybinds section below
    preserve_split = true # You probably want this
}

# See https://wiki.hypr.land/Configuring/Master-Layout/ for more
master {
    new_status = master
}

# https://wiki.hypr.land/Configuring/Variables/#misc
misc {
    force_default_wallpaper = -1 # Set to 0 or 1 to disable the anime mascot wallpapers
    disable_hyprland_logo = false # If true disables the random hyprland logo / anime girl background. :(
}


#############
### INPUT ###
#############

# https://wiki.hypr.land/Configuring/Variables/#input
input {
    kb_layout = us,ru
    kb_variant = intl,
    kb_model =
    kb_options = grp:shifts_toggle, compose:menu, nodeadkeys:false
    kb_rules =

    follow_mouse = 1

    sensitivity = 0 # -1.0 - 1.0, 0 means no modification.

    touchpad {
        natural_scroll = true
        scroll_factor = 0.25
    }
}

# See https://wiki.hypr.land/Configuring/Gestures
gesture = 3, horizontal, workspace

# Example per-device config
# See https://wiki.hypr.land/Configuring/Keywords/#per-device-input-configs for more
device {
    name = epic-mouse-v1
    sensitivity = -0.5
}


###################
### KEYBINDINGS ###
###################

# See https://wiki.hypr.land/Configuring/Keywords/
$mainMod = SUPER # Sets "Windows" key as main modifier

# Example binds, see https://wiki.hypr.land/Configuring/Binds/ for more
bind = $mainMod, Return, exec, $terminal
bind = $mainMod SHIFT, Q, killactive,
bind = $mainMod SHIFT, M, exec, command -v hyprshutdown >/dev/null 2>&1 && hyprshutdown || hyprctl dispatch exit
bind = $mainMod, E, exec, $fileManager
bind = $mainMod, V, togglefloating,
bind = $mainMod, D, exec, $menu
bind = $mainMod, P, pseudo, # dwindle
bind = $mainMod, J, layoutmsg, togglesplit # dwindle

# Cycle layouts: dwindle → master → scroller → monocle
bind = $mainMod SHIFT, L, exec, ~/.config/hypr/scripts/cycle-layout.sh

# Move focus with mainMod + arrow keys
bind = $mainMod, left, movefocus, l
bind = $mainMod, right, movefocus, r
bind = $mainMod, up, movefocus, u
bind = $mainMod, down, movefocus, d

# Cycle windows in monocle layout (layoutmsg required — cyclenext dispatcher skips monocle)
bind = $mainMod ALT, left,  layoutmsg, cycleprev
bind = $mainMod ALT, right, layoutmsg, cyclenext

# Move windows with mainMod + SHIFT + arrow keys
bind = $mainMod SHIFT, left, movewindow, l
bind = $mainMod SHIFT, right, movewindow, r
bind = $mainMod SHIFT, up, movewindow, u
bind = $mainMod SHIFT, down, movewindow, d

# Switch to the left and right workspaces
bind = $mainMod + SHIFT, bracketleft, movecurrentworkspacetomonitor, l
bind = $mainMod + SHIFT, bracketright, movecurrentworkspacetomonitor, r

# Switch workspaces — full numbers row: ` 1 2 3 4 5 6 7 8 9 0 - =
bind = $mainMod, dead_grave, workspace, $ws_terminal
bind = $mainMod, 1,     workspace, $ws_browser
bind = $mainMod, 2,     workspace, $ws_code
bind = $mainMod, 3,     workspace, $ws_devops
bind = $mainMod, 4,     workspace, $ws_files
bind = $mainMod, 5,     workspace, $ws_media
bind = $mainMod, 6,     workspace, $ws_chat
bind = $mainMod, 7,     workspace, $ws_teams
bind = $mainMod, 8,     workspace, $ws_utility
bind = $mainMod, 9,     workspace, $ws_settings
bind = $mainMod, 0,     workspace, $ws_flex1
bind = $mainMod, minus, workspace, $ws_flex2
bind = $mainMod, equal, workspace, $ws_flex3

# Move active window to workspace — full numbers row
bind = $mainMod SHIFT, dead_grave, movetoworkspace, $ws_terminal
bind = $mainMod SHIFT, 1,     movetoworkspace, $ws_browser
bind = $mainMod SHIFT, 2,     movetoworkspace, $ws_code
bind = $mainMod SHIFT, 3,     movetoworkspace, $ws_devops
bind = $mainMod SHIFT, 4,     movetoworkspace, $ws_files
bind = $mainMod SHIFT, 5,     movetoworkspace, $ws_media
bind = $mainMod SHIFT, 6,     movetoworkspace, $ws_chat
bind = $mainMod SHIFT, 7,     movetoworkspace, $ws_teams
bind = $mainMod SHIFT, 8,     movetoworkspace, $ws_utility
bind = $mainMod SHIFT, 9,     movetoworkspace, $ws_settings
bind = $mainMod SHIFT, 0,     movetoworkspace, $ws_flex1
bind = $mainMod SHIFT, minus, movetoworkspace, $ws_flex2
bind = $mainMod SHIFT, equal, movetoworkspace, $ws_flex3

# Example special workspace (scratchpad)
bind = $mainMod, S, togglespecialworkspace, magic
bind = $mainMod SHIFT, S, movetoworkspace, special:magic

# Scroll through existing workspaces with mainMod + scroll
bind = $mainMod, mouse_down, workspace, e+1
bind = $mainMod, mouse_up, workspace, e-1

# Move/resize windows with mainMod + LMB/RMB and dragging
bindm = $mainMod, mouse:272, movewindow
bindm = $mainMod, mouse:273, resizewindow

# Laptop multimedia keys for volume and LCD brightness
bindel = ,XF86AudioRaiseVolume, exec, wpctl set-volume -l 1 @DEFAULT_AUDIO_SINK@ 5%+
bindel = ,XF86AudioLowerVolume, exec, wpctl set-volume @DEFAULT_AUDIO_SINK@ 5%-
bindel = ,XF86AudioMute, exec, wpctl set-mute @DEFAULT_AUDIO_SINK@ toggle
bindel = ,XF86AudioMicMute, exec, wpctl set-mute @DEFAULT_AUDIO_SOURCE@ toggle
bindel = ,XF86MonBrightnessUp, exec, brightnessctl -e4 -n2 set 5%+
bindel = ,XF86MonBrightnessDown, exec, brightnessctl -e4 -n2 set 5%-

# Requires playerctl
bindl = , XF86AudioNext, exec, playerctl next
bindl = , XF86AudioPause, exec, playerctl play-pause
bindl = , XF86AudioPlay, exec, playerctl play-pause
bindl = , XF86AudioPrev, exec, playerctl previous

##############################
### WINDOWS AND WORKSPACES ###
##############################

# See https://wiki.hypr.land/Configuring/Window-Rules/ for more
# See https://wiki.hypr.land/Configuring/Workspace-Rules/ for workspace rules

# Example windowrules that are useful

windowrule {
    name = terminal-opacity
    opacity = 0.90 0.70
    match:class = Alacritty
}

windowrule {
    # Ignore maximize requests from all apps. You'll probably like this.
    name = suppress-maximize-events
    match:class = .*

    suppress_event = maximize
}

windowrule {
    # Fix some dragging issues with XWayland
    name = fix-xwayland-drags
    match:class = ^$
    match:title = ^$
    match:xwayland = true
    match:float = true
    match:fullscreen = false
    match:pin = false

    no_focus = true
}

# Hyprland-run windowrule
windowrule {
    name = move-hyprland-run

    match:class = hyprland-run

    move = 20 monitor_h-120
    float = yes
}

# 1. Cattura l'intero schermo e copialo negli appunti
bind = , Print, exec, grim - | wl-copy

# 2. Seleziona un'area e copiala negli appunti (Perfetto per chat veloci)
bind = SHIFT, Print, exec, grim -g "$(slurp)" - | wl-copy

# 3. Seleziona un'area e aprila in Swappy per modificarla (Frecce, testo, blur)
bind = ALT + SHIFT, S, exec, grimblast --freeze save area - | swappy -f -

bind = $mainMod, L, exec, hyprlock

bind = $mainMod, F, fullscreenstate, 1 0,

bind = $mainMod, B, exec, helium-browser

bind = $mainMod, N, exec, swaync-client -t -sw

# App → workspace assignment
# workspace IDs: 1=terminal ` | 2=browser 1 | 3=code 2 | 4=devops 3 | 5=files 4
#                6=media 5   | 7=chat 6    | 8=teams 7 | 9=utility 8 | 10=settings 9

windowrule {
    name = ws-terminal
    match:class = Alacritty
    workspace = $ws_terminal
}

windowrule {
    name = ws-browser-work
    match:class = ^(helium-work|helium|[Cc]hromium|firefox|brave-browser)$
    workspace = $ws_browser
}

windowrule {
    name = ws-browser-personal
    match:class = ^(helium-personal)$
    workspace = $ws_flex1
}

windowrule {
    name = ws-code
    match:class = ^(code-url-handler|[Cc]ode|[Cc]odium|VSCodium)$
    workspace = $ws_code silent
}

windowrule {
    name = ws-devops
    match:class = ^(Freelens)$
    workspace = $ws_devops
}

windowrule {
    name = ws-devops-navicat
    match:title = ^Navicat Premium.*$
    workspace = $ws_devops silent
}

windowrule {
    name = ws-files
    match:class = ^.*(dolphin|[Tt]hunar|[Nn]autilus|[Nn]emo)$
    workspace = $ws_files
}

windowrule {
    name = ws-media
    match:class = ^([Ss]potify|vlc|mpv)$
    workspace = $ws_media silent
}

windowrule {
    name = ws-chat
    match:class = ^([Dd]iscord|vesktop|.*ayugram.*|TelegramDesktop|telegram-desktop|org\.telegram\.desktop)$
    workspace = $ws_chat silent
}

windowrule {
    name = ws-teams
    match:class = ^(Ferdium)$
    workspace = $ws_teams silent
}

windowrule {
    name = ws-utility
    match:class = ^([Oo]bsidian|zathura|evince)$
    workspace = $ws_utility silent
}

windowrule {
    name = ws-settings
    match:class = ^(org\.pulseaudio\.pavucontrol|blueman-manager|gnome-control-center|nm-connection-editor)$
    workspace = $ws_settings
}
